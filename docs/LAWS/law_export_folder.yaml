

$schema: "https://json-schema.org/draft/2020-12/schema"
$title: "Jiazi Law: export_folder"

version: 0.2.0
law_type: export_folder

purpose: |
  Define the required structure of the `export/` directory produced by an
  analysis repository so that Jiazi can automatically ingest analysis artifacts
  (figures, tables, code, sop, metadata, and actionbrief) and generate manuscripts.

principles:
  - The export folder is the **only interface** between an analysis repository and Jiazi.
  - All scientific artifacts used in the manuscript must appear in this folder.
  - Files must be deterministic and reproducible.
  - Paths must be relative to the `export/` root.

required_structure:
  export:
    figures:
      description: Final figures used in the manuscript.
      file_pattern: "fig_*.png | fig_*.jpg"
      naming_rule: "fig_XXX.ext  (XXX = short name abbreviation, no numbers)"
      example:
        - fig_global_distribution.png
        - fig_model_accuracy.png

    tables:
      description: Final tables used in the manuscript.
      file_pattern: "table_*.xlsx"
      naming_rule: "table_XXX.xlsx  (XXX = short name abbreviation, no numbers)"
      example:
        - table_sumstat.xlsx
        - table_main_reg.xlsx

    code:
      description: Minimal reproducible code required to regenerate the core results.
      required_files:
        - run_analysis.py
      optional_files:
        - modelling.py
        - data_processing.py
        - utils/
      source_sync:
        - All .py files under src/ in the analysis repository must be copied into
          export/code/ as part of the export process.
      rules:
        - run_analysis.py must reproduce all exported figures and tables.
        - code should not depend on notebook execution.
        - All .py files from src/ must be present in export/code/ before handoff to Jiazi.

    "AnaSOP.md":
      description: |
        Human-authored analysis specification document (Standard Operating Procedure).
        Describes research objectives, identification strategy, variable definitions,
        and the analytical workflow that the code implements.
        Placed directly at the export/ root (not inside a subdirectory).
      requirement: mandatory
      rules:
        - AnaSOP.md must be kept in sync with the actual analysis code.
        - Jiazi uses this document as the authoritative description of analytical intent.

    configs:
      description: Configuration files used for the analysis.
      optional: true
      examples:
        - params.yaml
        - experiment_config.yaml

    metadata:
      description: Structured metadata used by Jiazi for explanation.
      required_files:
        - variable_dictionary.yaml
        - dataset_dictionary.yaml

    "actionbrief.yaml":
      description: |
        Core interface file describing datasets, variables, figures,
        tables, and the analytical workflow.
      requirement: mandatory

integration_rules:
  - All figures referenced in actionbrief.yaml must exist in export/figures/.
  - All tables referenced in actionbrief.yaml must exist in export/tables/.
  - Variables described in variable_dictionary.yaml must appear in actionbrief.variableDictionary.
  - Dataset entries must appear in dataset_dictionary.yaml.
  - export/AnaSOP.md must be present at the export/ root.

naming_conventions:
  figures_prefix: "fig_"
  tables_prefix: "table_"
  note: "No sequential numbers in filenames. Manuscript numbering is managed by a separate document."

validation:
  checks:
    - verify_required_directories
    - verify_actionbrief_exists
    - verify_figures_match_dictionary
    - verify_tables_match_dictionary
    - verify_metadata_consistency
    - verify_sop_present
    - verify_src_py_files_copied_to_code

output_target:
  description: |
    The entire export folder can be copied directly into a Jiazi SHOW
    directory. Jiazi will then automatically load:
      - figures
      - tables
      - code
      - AnaSOP.md
      - actionbrief
      - metadata

example_mapping:
  export:
    figures: "SHOW_xxx/figures/"
    tables: "SHOW_xxx/tables/"
    code: "SHOW_xxx/code/"
    "AnaSOP.md": "SHOW_xxx/AnaSOP.md"
    "actionbrief.yaml": "SHOW_xxx/actionbrief.yaml"
    metadata: "SHOW_xxx/metadata/"

notes:
  - The export folder should contain only final artifacts.
  - Intermediate analysis outputs must remain inside the analysis repo.
  - Jiazi will never modify files inside the export folder.
